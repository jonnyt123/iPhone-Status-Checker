kind = "web"
previewPath = "/"
title = "Trusted IMEI Check"
version = "1.0.0"
id = "artifacts/imei-check"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24640

[services.development]
run = "pnpm --filter @workspace/imei-check run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imei-check", "run", "build" ]
publicDir = "artifacts/imei-check/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24640"
BASE_PATH = "/"
